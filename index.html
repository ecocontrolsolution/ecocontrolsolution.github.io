<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoControlSolution</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #333;
  }

  /* Header with background image */
  .header {
    position: relative;
    width: 100%;
    height: 350px;
    background: url('images/automation-bg.jpg') no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    text-align: center;
    color: white;
  }

  /* Company name with blinking effect */
  .company-name {
    font-size: 3em;
    font-weight: bold;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    animation: blink 1.2s infinite alternate;
  }

  @keyframes blink {
    0% { opacity: 1; transform: translateY(0); }
    50% { opacity: 0.5; transform: translateY(-5px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Footer line animation in header */
  .footer-line {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 80%;
    height: 5px;
    background: #00aaff;
    transform: translateX(-50%);
    animation: slide 2s infinite alternate;
  }

  @keyframes slide {
    0% { width: 0; }
    100% { width: 80%; }
  }

  /* Section styling */
  section {
    padding: 50px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Gallery images with hover popup effect */
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    width: 250px;
    height: 180px;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
  }

  .gallery-item:hover img {
    transform: scale(1.1);
  }

  .gallery-item span {
    position: absolute;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    width: 100%;
    text-align: center;
    color: white;
    padding: 10px 0;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .gallery-item:hover span {
    opacity: 1;
  }

  /* Contact form */
  .contact-form {
    max-width: 500px;
    margin: 0 auto;
  }

  .contact-form input, 
  .contact-form textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  .contact-form button {
    padding: 12px 20px;
    background: #00aaff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .contact-form button:hover {
    background: #0077aa;
  }

</style>
</head>
<body>

<!-- Header Section -->
<header class="header">
  <div>
    <div class="company-name">EcoControlSolution</div>
    <div class="footer-line"></div>
  </div>
</header>

<!-- Gallery Section -->
<section>
  <h2 style="text-align:center;">Our Solutions</h2>
  <div class="gallery">
    <div class="gallery-item">
      <img src="images/heater.jpg" alt="Heater Solution">
      <span>Heater Automation</span>
    </div>
    <div class="gallery-item">
      <img src="images/sensor.jpg" alt="Sensor Solution">
      <span>Industrial Sensors</span>
    </div>
    <div class="gallery-item">
      <img src="images/automation.jpg" alt="Automation">
      <span>Building Automation</span>
    </div>
  </div>
</section>

<!-- Contact Section -->
<section>
  <h2 style="text-align:center;">Contact Us</h2>
  <form class="contact-form">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email Address" required>
    <textarea rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

</body>
</html>
